---
layout: default
---

<article class="max-w-3xl mx-auto px-4 sm:px-6 pb-12">
  <header class="pt-4 pb-10 mb-10 border-b border-slate-200">
    <time class="block mb-3 text-xs uppercase tracking-widest text-slate-500 font-semibold" datetime="{{ page.date | date:"%Y-%m-%d" }}">{{ page.date | date:"%Y-%m-%d" }}</time>
    <h1 class="text-3xl sm:text-4xl tracking-tight text-slate-900 font-bold leading-tight">{{ page.title }}</h1>
  </header>

  <div class="prose prose-slate prose-lg max-w-none content">
    {{ content }}
  </div>
</article>
