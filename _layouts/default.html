<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta charset="utf-8">
    <title>{{ page.title | default: site.title }}</title>
    <link rel="shortcut icon" href="/assets/images/favicon.ico">
    <link rel="stylesheet" href="{{ "/assets/css/main.css" | relative_url }}">
    {% seo title=false %}
  </head>
  <body class="text-slate-900 antialiased bg-white">
    <header class="max-w-3xl mx-auto px-4 sm:px-6 py-6 flex items-center justify-between">
      <a href="/" class="text-lg font-bold tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-pink-500 via-purple-500 to-indigo-500">{{ site.title }}</a>
      <nav class="flex items-center gap-3 text-slate-400">
        <a href="https://twitter.com/daichirata" target="_blank" rel="noopener noreferrer" title="Twitter" class="hover:text-slate-700 transition-colors">{% include twitter.svg %}</a>
        <a href="https://github.com/daichirata" target="_blank" rel="noopener noreferrer" title="GitHub" class="hover:text-slate-700 transition-colors">{% include github.svg %}</a>
      </nav>
    </header>

    {{ content }}

    <footer class="max-w-3xl mx-auto px-4 sm:px-6 py-12">
      <p class="text-center text-sm text-slate-500">© {{ site.time | date: '%Y' }} Daichi Hirata</p>
    </footer>

    {% include ga.html %}
  </body>
</html>
